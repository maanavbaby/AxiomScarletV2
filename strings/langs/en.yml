ABOUT_1 : "<blockquote><b>вқ– {0} sбҙңбҙҳбҙҳПғкқӣбҙӣ ЙӘО·Т“Пғ :-</b>\n\n<b>в—Ҹ рқҹёрқҹә/7 бҙ§бҙ бҙ§ЙӘКҹбҙ§КҷКҹС” Т“Пғкқӣ бҙ§О·КҸ КҷПғбҙӣ.</b>\n<b>в—Ҹ бҙӢС”С”бҙҳ бҙ„Кңбҙ§бҙӣ бҙ„КҹС”бҙ§О· бҙ§О·бҙ… КҷбҙңЙў-Т“кқӣС”С”.</b>\n<b>в—Ҹ бҙ§О·КҸ бҙҳкқӣПғКҷКҹС”П» ? бҙҠбҙңsбҙӣ бҙ„ПғО·бҙӣбҙ§бҙ„бҙӣ бҙңs.</b>\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ</b></blockquote>\n<blockquote expandable><b>в—Ҹ бҙЎкқӣЙӘбҙӣбҙӣС”О· ЙӘО· вһҘ [бҙ©КҸбҙӣКңПғО·](Кңбҙӣбҙӣбҙҳs://www.python.org/)</b>\n<b>в—Ҹ бҙ…бҙ§бҙӣбҙ§Кҷбҙ§sС” вһҘ [П»ПғО·ЙўПғ-бҙ…Кҷ](Кңбҙӣбҙӣбҙҳs://www.mongodb.com/)</b>\n<b>в—Ҹ КңС”Кҹбҙҳ бҙЎЙӘбҙӣКң [бҙҳКҸкқӣПғЙўкқӣбҙ§П»](Кңбҙӣбҙӣбҙҳs://github.com/pyrogram/pyrogram) & [бҙҳКҸ-бҙӣЙўбҙ„бҙ§КҹКҹs](Кңбҙӣбҙӣбҙҳs://github.com/pytgcalls/pytgcalls).</b>\n<b>в—Ҹ ЙўЙӘбҙӣ КңбҙңКҷ В» [ ПғбҙЎО·С”кқӣ бҙ§xЙӘПғП» ](Кңбҙӣбҙӣбҙҳs://t.me/CreativeAxiom/2)</b>\n<b>в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ</b>\n<b>вңҰ бҙ§ П»бҙңsЙӘбҙ„ КҷПғбҙӣ Т“Пғкқӣ бҙӣЙў ЙўкқӣПғбҙңбҙҳs / бҙ„Кңбҙ§О·О·С”Кҹs</b>\n<b>вңҰ О·Пғ Кҹбҙ§Йў вҖў О·Пғ бҙ§бҙ…s вҖў О·Пғ КҷбҙңЙўs вҖў рқҹёрқҹә/7 бҙ§КҹЙӘбҙ С”</b>\n<b>вңҰ С”О·бҙҠПғКҸ Кҹбҙ§Йў Т“кқӣС”С” П»бҙңsЙӘбҙ„ вҖў бҙ§бҙ…бҙ… П»С” О·ПғбҙЎ</b>\n<b>в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ</b>\n<b>В» бҙҳкқӣЙӘбҙ бҙ§бҙӣС” & sС”бҙ„П…кқӣС” sПғбҙңкқӣбҙ„С” | О·Пғ бҙ…бҙ§бҙӣбҙ§ sКңбҙ§кқӣС”.</b>\n<b>В» КҹЙӘбҙ„С”О·бҙ„С”бҙ… бҙңsС” | КҸПғП…СӮП…КҷС” бҙ§бҙҳЙӘ sП…бҙҳбҙҳПғкқӣСӮС”бҙ….</b>\n<b>в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ</b></blockquote>"
